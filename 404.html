  <script>
document.addEventListener("DOMContentLoaded", function () {
  const SITE_ID = "SITE_ID";
  const form = document.querySelector('[data-lead="form"]');
  if (form) {
    form.addEventListener("submit", function () {
      const data = {
        site_id: SITE_ID,
        first_name: form.querySelector('[data-lead="first_name"]')?.value || "",
        last_name: form.querySelector('[data-lead="last_name"]')?.value || "",
        email: form.querySelector('[data-lead="email"]')?.value || "",
        phone: form.querySelector('[data-lead="phone"]')?.value || "",
        message: form.querySelector('[data-lead="message"]')?.value || "",
        service: form.querySelector('[data-lead="service"]')?.value || "",
        source: form.dataset.source || "contact"
      };
      sessionStorage.setItem("veltech_lead", JSON.stringify(data));
    });
  }
  const formPhone = document.querySelector('[data-lead="form-phone"]');
  if (formPhone) {
    formPhone.addEventListener("submit", function () {
      const data = {
        site_id: SITE_ID,
        first_name: "",
        last_name: "",
        email: "",
        phone: formPhone.querySelector('[data-lead="phone"]')?.value || "",
        message: "",
        service: formPhone.querySelector('[data-lead="service"]')?.value || "",
        source: formPhone.dataset.source || "rappel"
      };
      sessionStorage.setItem("veltech_lead", JSON.stringify(data));
    });
  }
  const formNews = document.querySelector('[data-lead="form-newsletter"]');
  if (formNews) {
    formNews.addEventListener("submit", function () {
      const data = {
        site_id: SITE_ID,
        first_name: "",
        last_name: "",
        email: formNews.querySelector('[data-lead="email"]')?.value || "",
        phone: "",
        message: "",
        service: "",
        source: formNews.dataset.source || "newsletter"
      };
      sessionStorage.setItem("veltech_lead", JSON.stringify(data));
    });
  }
  const formExt = document.querySelector('[data-lead="form-extended"]');
  if (formExt) {
    formExt.addEventListener("submit", function () {
      setTimeout(() => {
        const known = ["first_name", "last_name", "email", "phone", "message"];
        const data = {
          site_id: SITE_ID,
          first_name: formExt.querySelector('[data-lead="first_name"]')?.value || "",
          last_name: formExt.querySelector('[data-lead="last_name"]')?.value || "",
          email: formExt.querySelector('[data-lead="email"]')?.value || "",
          phone: formExt.querySelector('[data-lead="phone"]')?.value || "",
          message: formExt.querySelector('[data-lead="message"]')?.value || "",
          source: formExt.dataset.source || "contact"
        };
        const extra = [];
        formExt.querySelectorAll("input, select, textarea").forEach(input => {
          if (input.dataset.lead && known.includes(input.dataset.lead)) return;
          if (input.type === "submit") return;
          if (!input.value) return;
          const label = input.dataset.name || input.name || input.id || "Champ";
          extra.push(`${label}: ${input.value}`);
        });
        if (extra.length > 0) data.extra = extra.join("\n");
        sessionStorage.setItem("veltech_lead", JSON.stringify(data));
      }, 0);
    });
  }
});
</script>
